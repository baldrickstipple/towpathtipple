<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Friends of the Towpath | Baldrick's Towpath Tipple</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background-color: #f5f5dc;
  text-align: center;
}

nav {
  background: #8b0000;
  padding: 10px;
}

nav a {
  color: white;
  margin: 10px;
  text-decoration: none;
  font-weight: bold;
}

section {
  padding: 30px 20px;
}

.link-card {
  background: #fff8dc;
  border: 2px solid #8b0000;
  border-radius: 8px;
  padding: 15px;
  margin: 15px auto;
  max-width: 500px;
}

.link-card a {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 15px;
  background: #1f3a3a;
  color: #f5f1e6;
  text-decoration: none;
  border-radius: 5px;
}
</style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
</nav>

<section>
  <h1>🤝 Friends of the Towpath</h1>
  <p>People, places, and events we love along the canal.</p>

  <div id="links-container">
    <p>Loading...</p>
  </div>
</section>

<script>
fetch("links.txt")
  .then(response => response.text())
  .then(data => {
    const lines = data.split("\n");

    let output = "";
    let name = "", desc = "", url = "";

    lines.forEach(line => {
      line = line.trim();

      if (line.startsWith("NAME:")) {
        name = line.replace("NAME:", "").trim();
      } else if (line.startsWith("DESC:")) {
        desc = line.replace("DESC:", "").trim();
      } else if (line.startsWith("URL:")) {
        url = line.replace("URL:", "").trim();

        // When URL is reached, output a card
        output += `
          <div class="link-card">
            <h3>${name}</h3>
            <p>${desc}</p>
            <a href="${url}" target="_blank">Visit</a>
          </div>
        `;
      }
    });

    document.getElementById("links-container").innerHTML = output;
  })
  .catch(() => {
    document.getElementById("links-container").innerHTML =
      "<p>Links unavailable right now</p>";
  });
</script>

</body>
</html>
