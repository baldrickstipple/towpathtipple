<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Friends | Baldrick's Towpath Tipple</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background-color: #f5f5dc;
  color: #333;
  text-align: center;
}

nav {
  background: #8b0000;
  padding: 10px;
  position: sticky;
  top: 0;
  z-index: 1000;
}

nav a {
  color: white;
  margin: 10px;
  text-decoration: none;
  font-weight: bold;
}

section {
  padding: 30px 20px;
}

.banner {
  background: #006400;
  color: white;
  padding: 10px;
  font-weight: bold;
}

footer {
  background-color: #8b0000;
  color: white;
  padding: 30px 20px;
}

/* Link cards */
.link-card {
  background: #fff8dc;
  border: 2px solid #8b0000;
  border-radius: 8px;
  padding: 15px;
  margin: 15px auto;
  max-width: 500px;
}

.button {
  display: inline-block;
  padding: 10px 15px;
  margin-top: 10px;
  background-color: #1f3a3a;
  color: #f5f1e6;
  text-decoration: none;
  border: 2px solid #d4c7a1;
  border-radius: 6px;
}
</style>
</head>

<body>

<!-- NAV (same as main site) -->
<nav>
  <a href="index.html#top">Home</a>
  <a href="index.html#location">Where Are We</a>
  <a href="index.html#drinks">Bar</a>
  <a href="index.html#photos">Photos</a>
  <a href="index.html#hire">Private Hire</a>
  <a href="index.html#social">Social</a>
  <a href="links.html">Friends</a>
  <a href="https://gofund.me/8f1d9fd5" target="_blank" style="color:yellow;">
    Support Us
  </a>
</nav>

<div class="banner">
  🤝 Friends of the Towpath
</div>

<section>
  <h2>People & Places We Recommend</h2>
  <p>Events, traders, and good company along the canal.</p>

  <div id="links-container">
    <p>Loading...</p>
  </div>
</section>

<footer>
  <p>Baldrick’s Towpath Tipple</p>
  <p><a href="index.html" style="color:yellow;">Back to Home</a></p>
</footer>

<script>
fetch("links.txt")
  .then(response => response.text())
  .then(data => {
    const lines = data.split("\n");

    let output = "";
    let name = "", desc = "", url = "";

    lines.forEach(line => {
      line = line.trim();

      if (line.startsWith("NAME:")) {
        name = line.replace("NAME:", "").trim();
      } else if (line.startsWith("DESC:")) {
        desc = line.replace("DESC:", "").trim();
      } else if (line.startsWith("URL:")) {
        url = line.replace("URL:", "").trim();

        output += `
          <div class="link-card">
            <h3>${name}</h3>
            <p>${desc}</p>
            <a href="${url}" target="_blank" class="button">Visit</a>
          </div>
        `;
      }
    });

    document.getElementById("links-container").innerHTML = output;
  })
  .catch(() => {
    document.getElementById("links-container").innerHTML =
      "<p>Links unavailable right now</p>";
  });
</script>

</body>
</html>
