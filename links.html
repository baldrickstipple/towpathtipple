

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friends | Baldrick's Towpath Tipple</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {margin:0;font-family:'Inter',sans-serif;background:#0f172a;color:#f1f5f9;text-align:center;}
nav {background:#020617;padding:12px;position:sticky;top:0;}
nav a {color:#f1f5f9;margin:10px;text-decoration:none;}
nav a:hover {color:#f59e0b;}
section {padding:60px 20px;max-width:900px;margin:auto;}
.card {background:#1e293b;padding:20px;border-radius:12px;margin:15px 0;}

.button {
  display:inline-block;
  padding:12px 22px;
  margin:8px;
  background:#8b1e1e;           /* deep canal red */
  color:#f5f1e6;                /* cream text */
  text-decoration:none;
  border-radius:10px;
  font-weight:600;
  border:2px solid #d4c7a1;     /* aged gold */
  box-shadow: 3px 3px 0 #1f3a3a; /* dark green shadow */
  transition: all 0.25s ease;
}

.button:hover {
  background:#a52a2a;           /* slightly brighter red */
  transform: translateY(-2px);
  box-shadow: 4px 4px 0 #1f3a3a;
}

footer {background:#020617;padding:30px;}
</style>
</head>
<body>

<nav>
<a href="index.html#top">Home</a>
<a href="index.html#location">Where</a>
<a href="index.html#drinks">Bar</a>
<a href="links.html">Friends</a>
<a href="index.html#photos">Photos</a>
<a href="index.html#hire">Hire</a>
<a href="menu.html">Menu</a>
<a href="index.html#social">Social</a>
<a href="support.html" style="color:#f59e0b;">Support</a>
</nav>

<section>
<h1>🤝 Friends of the Towpath</h1>
<p>Good people, traders & events along the canal.</p>
<div id="links-container">Loading...</div>
</section>

<footer>
<p>Baldrick's Towpath Tipple</p>
</footer>

<script>
fetch("links.txt")
  .then(response => response.text())
  .then(data => {
    const lines = data.split("\n");

    let output = "";
    let name = "", desc = "", url = "";

    lines.forEach(line => {
      line = line.trim();

      if (line.startsWith("NAME:")) {
        name = line.replace("NAME:", "").trim();
      } else if (line.startsWith("DESC:")) {
        desc = line.replace("DESC:", "").trim();
      } else if (line.startsWith("URL:")) {
        url = line.replace("URL:", "").trim();

        output += `
          <div class="link-card">
            <h3>${name}</h3>
            <p>${desc}</p>
            <a href="${url}" target="_blank" class="button">Visit</a>
          </div>
        `;
      }
    });

    document.getElementById("links-container").innerHTML = output;
  })
  .catch(() => {
    document.getElementById("links-container").innerHTML =
      "<p>Links unavailable right now</p>";
  });

</script>

</body>
</html>
